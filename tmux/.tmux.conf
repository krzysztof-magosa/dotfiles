# ─── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix   # C-a C-a → send literal C-a (bash line-start)

# ─── Core ──────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:Tc"                                       # true colour
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'                               # cursor shape passthrough (neovim modes)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'                                   # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colour

set -sg escape-time 0        # no Esc delay — neovim requires this
set -g  focus-events on      # pass focus events to apps (neovim autoread, etc.)
set -g  repeat-time 600
set -g  history-limit 50000
set -g  display-time 4000
set -g  status-interval 5
set -g  mouse on
set -g  set-clipboard on

# ─── Indexing ──────────────────────────────────────────────────────────────────
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on  # fill gaps when a window is closed

# ─── Key bindings ──────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Splits — always open in current pane's directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation — vim-style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable with repeat-time window)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window
bind    Tab last-window      # jump to last active window

# Session management
bind S choose-session
bind N new-session -c "#{pane_current_path}"

# ─── Copy mode ─────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind  Enter copy-mode
bind -T copy-mode-vi v       send -X begin-selection
bind -T copy-mode-vi V       send -X select-line
bind -T copy-mode-vi C-v     send -X rectangle-toggle
bind -T copy-mode-vi y       send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape  send -X cancel
bind -T copy-mode-vi H       send -X start-of-line
bind -T copy-mode-vi L       send -X end-of-line
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ─── Status bar ────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style          "bg=#282c34,fg=#5c6370"
set -g status-left-length    40
set -g status-right-length   60

set -g status-left  "#[fg=#4aa5f0,bold] #S #[fg=#5c6370,nobold]│ "
set -g status-right "#[fg=#98c379]#{?pane_in_mode,[COPY] ,}#[fg=#5c6370] %H:%M  %d %b "

set -g window-status-format         "#[fg=#5c6370] #I #W "
set -g window-status-current-format "#[fg=#abb2bf,bold] #I #W#{?window_zoomed_flag, [Z],} "
set -g window-status-separator      ""

# ─── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#3e4451"
set -g pane-active-border-style "fg=#4aa5f0"
set -g pane-border-lines        single

# ─── Messages ──────────────────────────────────────────────────────────────────
set -g message-style         "bg=#3e4451,fg=#abb2bf"
set -g message-command-style "bg=#3e4451,fg=#abb2bf"

# ─── Bells & activity ──────────────────────────────────────────────────────────
set -g visual-bell    off
set -g visual-activity off
set -g bell-action    none
